<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Standalone Usage Focus Prototype</title><style>:root{color-scheme:dark;--bg:#0f172a;--panel:#182235;--text:#f8fafc;--muted:#cbd5e1;--accent:#38bdf8}*{box-sizing:border-box}body{margin:0;padding:32px;background:var(--bg);color:var(--text);font:14px system-ui}.region{display:inline-block}.trigger{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border:1px solid #475569;border-radius:999px;background:#1e293b;color:var(--text);font-weight:700}.trigger:focus-visible{outline:3px solid var(--accent);outline-offset:3px}.panel{display:none;margin-top:10px;width:min(420px,calc(100vw - 32px));padding:16px;border:1px solid #64748b;border-radius:14px;background:var(--panel);box-shadow:0 16px 40px #0008}.region:hover .panel,.region:focus-within .panel{display:block}.ring{width:34px;height:34px;border-radius:50%;background:conic-gradient(var(--accent) 42%,#334155 0);display:grid;place-items:center}.ring:after{content:'5h';width:24px;height:24px;border-radius:50%;background:var(--panel);display:grid;place-items:center;font-size:9px;color:var(--text)}.hint{color:var(--muted);margin-top:14px}button{font:inherit}</style></head><body><main><h1>Standalone 用量触发</h1><div class="region"><button class="trigger" aria-expanded="false" aria-controls="usage-panel"><span class="ring" aria-hidden="true"></span>GPT 用量</button><section id="usage-panel" class="panel" role="dialog" aria-label="GPT 用量详情"><strong>焦点或悬停打开</strong><p>点击不是必需触发方式；Tab 聚焦 trigger 后面板可见，移入面板可保持。</p><button>刷新额度</button> <button>Models</button></section></div><p class="hint">验证：Tab 聚焦、鼠标悬停、移入面板、Escape 关闭与 focus-visible。</p></main></body></html>
