<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Usage Ledger refinement prototype</title>
<style>
:root{--bg:#fff;--bg-panel:#f5f5f5;--bg-hover:#eee;--bg-selected:#e8e8e8;--border:#e0e0e0;--text:#1a1a1a;--text-muted:#6b7280;--text-dim:#9ca3af;--accent:#2563eb;--accent-hover:#1d4ed8;--bg-subtle:rgba(0,0,0,.03);--green:#10b981;--red:#ef4444;--blue:#3b82f6;--orange:#f59e0b;--radius:7px;--mono:ui-monospace,SFMono-Regular,Menlo,monospace}
html.dark{--bg:#1a1a1a;--bg-panel:#242424;--bg-hover:#2e2e2e;--bg-selected:#383838;--border:#3a3a3a;--text:#e8e8e8;--text-muted:#9ca3af;--text-dim:#6b7280;--accent:#60a5fa;--bg-subtle:rgba(255,255,255,.04)}
*{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input{font:inherit;color:inherit}button{cursor:pointer}button:focus-visible,input:focus-visible{outline:2px solid var(--accent);outline-offset:2px}.app{display:flex;min-height:100vh;background:var(--bg)}
.sidebar{width:260px;display:flex;flex-direction:column;background:var(--bg-panel);border-right:1px solid var(--border);flex-shrink:0}.brand{padding:16px 14px;border-bottom:1px solid var(--border);font-weight:700;letter-spacing:.04em}.sessions{padding:12px;flex:1;color:var(--text-muted);font-size:12px}.session{padding:9px;border-radius:6px;margin-bottom:4px}.session.active{background:var(--bg-selected);color:var(--text)}.utility{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:8px;border-top:1px solid var(--border)}.utility button{height:30px;border:1px solid var(--border);border-radius:999px;background:var(--bg-panel);font-size:10px;color:var(--text-muted);display:flex;align-items:center;justify-content:center;gap:4px}.utility button:hover{border-color:var(--accent);color:var(--text)}.utility .usage{background:color-mix(in srgb,var(--accent) 12%,var(--bg));border-color:color-mix(in srgb,var(--accent) 62%,var(--border));color:var(--text)}
.icon{width:16px;height:16px;display:block;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.main{flex:1;min-width:0;padding:24px;background:var(--bg-subtle)}.intro{max-width:980px;margin:0 auto 12px;color:var(--text-muted);font-size:12px}.modal{max-width:980px;height:min(760px,calc(100vh - 48px));margin:auto;background:var(--bg);border:1px solid var(--border);border-radius:8px;box-shadow:0 22px 70px rgba(0,0,0,.18);display:flex;flex-direction:column;overflow:hidden}.header{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);background:var(--bg-panel);flex-wrap:wrap}.heading{display:flex;align-items:center;gap:8px;min-width:0}.heading h1{font-size:13px;margin:0;font-weight:600;white-space:nowrap}.heading p{margin:2px 0 0;font-size:10px;color:var(--text-dim);white-space:nowrap}.header .actions{margin-left:auto;display:flex;gap:6px}.icon-btn,.text-btn{height:28px;border:1px solid var(--border);border-radius:6px;background:var(--bg);padding:0 10px;color:var(--text-muted);font-size:11px}.icon-btn{width:28px;padding:0}.icon-btn:hover,.text-btn:hover{border-color:var(--accent);color:var(--text)}
.filters{display:flex;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap}.date{height:28px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:0 6px;font-size:11px}.label{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted)}.segmented{display:flex;height:28px;border:1px solid var(--border);border-radius:6px;overflow:hidden}.segmented button{border:0;background:transparent;padding:0 10px;font-size:11px;color:var(--text-muted)}.segmented button+button{border-left:1px solid var(--border)}.segmented button.active{background:var(--bg-selected);color:var(--text);font-weight:600}.segmented button:disabled{opacity:.35;cursor:not-allowed}
.dropdown{position:relative}.drop-trigger{height:28px;min-width:128px;border:1px solid var(--border);border-radius:7px;background:var(--bg);padding:0 9px;display:flex;align-items:center;gap:8px;text-align:left;font-size:11px}.drop-trigger span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.drop-menu{position:absolute;z-index:5;top:34px;left:0;min-width:200px;padding:6px;background:var(--bg);border:1px solid var(--border);border-radius:10px;box-shadow:0 16px 40px rgba(15,23,42,.18)}.drop-menu button{display:block;width:100%;padding:8px;border:0;border-radius:8px;text-align:left;background:transparent;font-size:12px;color:var(--text-muted)}.drop-menu button:hover,.drop-menu button.focused{background:var(--bg-hover);color:var(--text)}.drop-menu button.selected{background:var(--accent);color:#fff;font-weight:700}
.body{overflow:auto;padding:14px}.statebar{display:flex;gap:6px;align-items:center;margin-bottom:10px;color:var(--text-dim);font-size:10px}.statebar button{border:1px solid var(--border);background:var(--bg);border-radius:999px;padding:3px 8px;font-size:10px;color:var(--text-muted)}.statebar button.active{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,var(--bg))}.error{border:1px solid color-mix(in srgb,var(--red) 40%,var(--border));background:color-mix(in srgb,var(--red) 6%,var(--bg));color:var(--red);padding:14px;border-radius:7px;text-align:center}.error p{color:var(--text-muted);margin:6px}.spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:auto}@keyframes spin{to{transform:rotate(360deg)}}.loading{text-align:center;color:var(--text-muted);padding:70px}.empty{text-align:center;color:var(--text-dim);padding:70px}.empty strong{display:block;color:var(--text);margin:8px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}.card,.panel{border:1px solid var(--border);border-radius:7px;background:var(--bg-panel);padding:10px;min-width:0}.metric-label{font-size:10px;color:var(--text-dim);text-transform:uppercase}.metric-value{margin-top:5px;font-size:19px;font-weight:600;font-variant-numeric:tabular-nums}.metric-value.accent{font-size:21px;color:var(--accent)}.metric-sub{display:block;margin-top:4px;color:var(--text-dim);font-size:10px;font-weight:400}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:12px}.title{display:flex;justify-content:space-between;gap:10px;margin-bottom:9px;font-size:11px;font-weight:600}.title small{color:var(--text-dim);font-weight:400;font-variant-numeric:tabular-nums}.bars{display:flex;flex-direction:column;gap:8px}.barrow{display:grid;grid-template-columns:48px minmax(0,1fr) 110px;gap:8px;align-items:center;font-size:11px}.bar{height:12px;border:1px solid var(--border);border-radius:999px;overflow:hidden;background:var(--bg)}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#22c55e);border-radius:999px}.number{text-align:right;font-variant-numeric:tabular-nums}.chart-controls{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.chart-switch{display:flex;gap:3px}.chart-switch button{border:1px solid var(--border);border-radius:5px;background:var(--bg);padding:3px 6px;color:var(--text-muted);font-size:10px;white-space:nowrap}.chart-switch button.active{background:var(--bg-selected);color:var(--text);font-weight:600}.line-chart{width:100%;height:190px;display:block;overflow:visible}.line-grid{stroke:var(--border);stroke-width:1}.line-axis{fill:var(--text-dim);font-size:9px}.line-path{fill:none;stroke:var(--accent);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}.line-area{fill:color-mix(in srgb,var(--accent) 12%,transparent)}.line-point{fill:var(--bg);stroke:var(--accent);stroke-width:2;cursor:pointer}.line-point:hover,.line-point:focus{fill:var(--accent);outline:none}.token-row{display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:10px;padding:7px 0;border-top:1px solid var(--border);font-size:12px}.token-row label{color:var(--text-muted)}.exact{font-variant-numeric:tabular-nums}.m{color:var(--text-dim);font-variant-numeric:tabular-nums}.hint{border-bottom:1px dotted var(--text-muted);cursor:help}
.table-wrap{border:1px solid var(--border);border-radius:6px;overflow:auto;margin-bottom:12px}.table{width:100%;border-collapse:collapse;font-size:11px;min-width:660px}.table th{background:var(--bg-panel);padding:8px 10px;color:var(--text-muted);text-align:right;border-bottom:1px solid var(--border)}.table th:first-child,.table td:first-child{text-align:left}.table td{padding:10px;border-bottom:1px solid var(--border);text-align:right;font-variant-numeric:tabular-nums}.table tr.model{cursor:pointer}.table tr.model:hover{background:var(--bg-hover)}.provider{background:var(--bg-subtle);font-weight:600;text-align:left!important}.provider small{color:var(--text-dim);font-weight:400;margin-left:8px}.model-name{color:var(--text);font-weight:500}.table tfoot td{background:var(--bg-panel);color:var(--text-dim);font-size:10px;text-align:left}.breakdowns{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.list-row{display:grid;grid-template-columns:1fr 65px 65px;gap:8px;border-top:1px solid var(--border);padding:7px 0;font-size:11px}.list-row span:nth-child(2),.list-row span:nth-child(3){text-align:right;font-variant-numeric:tabular-nums}.list-row span:first-child{color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tooltip{display:none;position:fixed;z-index:8;right:30px;top:255px;width:220px;padding:10px 12px;border:1px solid var(--border);border-top:3px solid var(--accent);border-radius:9px;background:var(--bg);box-shadow:0 14px 36px rgba(16,24,40,.16);font-size:11px}.chart:hover .tooltip,.chart:focus-within .tooltip{display:block}.tooltip b{display:block;font-size:12px;margin-bottom:7px}.tooltip p{display:flex;justify-content:space-between;margin:4px 0;color:var(--text-muted)}.tooltip p strong{color:var(--text)}
.drawer{position:fixed;right:0;top:0;bottom:0;width:320px;background:var(--bg);border-left:1px solid var(--border);box-shadow:-10px 0 30px rgba(0,0,0,.15);z-index:10;padding:0 18px;overflow:auto}.drawer-head{margin:0 -18px 18px;padding:14px 18px;background:var(--bg-panel);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;font-size:13px;font-weight:600}.drawer h3{font-size:10px;color:var(--text-dim);text-transform:uppercase;margin:18px 0 6px}.drawer dl{display:grid;grid-template-columns:1fr 1.5fr;gap:8px;margin:0;padding:10px;background:var(--bg-panel);border-radius:6px;font-size:12px}.drawer dt{color:var(--text-muted)}.drawer dd{text-align:right;margin:0;font-weight:600;font-variant-numeric:tabular-nums}
@media(max-width:700px){.sidebar{width:52px}.brand,.sessions{display:none}.utility{grid-template-columns:1fr;padding:6px}.utility button{font-size:0}.utility button svg{width:16px}.main{padding:0}.intro{display:none}.modal{height:100vh;border-radius:0;border:0}.header{padding:11px}.heading p{display:none}.filters{gap:7px;padding:9px 11px}.filters .label{width:calc(50% - 4px)}.date{width:100%;min-width:0}.drop-trigger{flex:1;min-width:120px}.metrics{grid-template-columns:repeat(2,1fr)}.metric-value{font-size:17px}.grid,.breakdowns{grid-template-columns:1fr}.chart-controls{width:100%;justify-content:flex-start}.chart-title-range{display:none}.barrow{grid-template-columns:42px minmax(0,1fr) 92px}.body{padding:11px}.tooltip{right:12px;top:240px}.drawer{width:min(320px,100vw)}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" aria-label="侧边栏">
    <div class="brand">YPI <span style="color:var(--accent)">●</span></div>
    <div class="sessions"><div class="session active">当前工作区</div><div class="session">最近会话</div><div class="session">Studio runs</div></div>
    <div class="utility">
      <button title="Models">▦<span>Models</span></button>
      <button class="usage" title="Usage" aria-label="Usage"><svg class="icon" viewBox="0 0 24 24"><path d="M3 18l5-6 4 3 7-9"/><path d="M18 6h1v1"/><path d="M4 21h17"/></svg><span>Usage</span></button>
      <button title="Skills">◇<span>Skills</span></button><button title="Settings">⚙<span>Settings</span></button>
    </div>
  </aside>
  <main class="main">
    <div class="intro">离线原型 · 视口缩放到约 390px 检查窄屏布局；右上角可切换深色主题。</div>
    <section class="modal" role="dialog" aria-modal="true" aria-label="LLM 调用账本">
      <header class="header">
        <div class="heading"><svg class="icon" style="color:var(--accent)" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 18l5-6 4 3 7-9"/><path d="M18 6h1v1"/><path d="M4 21h17"/></svg><div><h1>LLM 调用账本 <span style="font-weight:400;color:var(--text-muted)">(Usage Ledger)</span></h1><p>独立 append-only 调用日志 · 不依赖 session 生命周期</p></div></div>
        <div class="actions"><button class="icon-btn" onclick="setState('loading')" title="刷新" aria-label="刷新">↻</button><button class="icon-btn" onclick="toggleTheme()" title="切换主题" aria-label="切换主题">◐</button><button class="icon-btn" title="关闭" aria-label="关闭">×</button></div>
      </header>
      <div class="filters">
        <label class="label">从 <input id="from" class="date" type="date" value="2026-07-09"></label>
        <label class="label">至 <input id="to" class="date" type="date" value="2026-07-15"></label>
        <div class="segmented" role="group" aria-label="工作区"><button id="allScope" class="active" onclick="scope('all')">全部</button><button id="cwdScope" onclick="scope('cwd')">当前</button></div>
        <div class="dropdown"><button id="sourceTrigger" class="drop-trigger" aria-haspopup="listbox" aria-expanded="false" onclick="toggleDrop('source')"><span>所有来源</span><b>⌄</b></button><div id="sourceMenu" class="drop-menu" role="listbox" hidden><button class="selected" role="option">所有来源</button><button role="option">Chat</button><button role="option">Studio SDK</button><button role="option">Terminal</button></div></div>
        <div class="dropdown"><button id="statusTrigger" class="drop-trigger" aria-haspopup="listbox" aria-expanded="false" onclick="toggleDrop('status')"><span>所有状态</span><b>⌄</b></button><div id="statusMenu" class="drop-menu" role="listbox" hidden><button class="selected" role="option">所有状态</button><button role="option">成功</button><button role="option">失败</button><button role="option">已中断</button></div></div>
        <button class="text-btn" onclick="resetFilters()">↺ 重置</button>
        <div id="rangeError" style="display:none;color:var(--red);font-size:10px;width:100%" role="alert">结束日期不能早于开始日期，请修正日期范围。</div>
      </div>
      <div class="body">
        <div class="statebar" aria-label="原型状态"><span>状态预览：</span><button class="active" onclick="setState('normal')">正常</button><button onclick="setState('loading')">加载</button><button onclick="setState('empty')">空数据</button><button onclick="setState('error')">非法范围</button><button disabled title="无 cwd 时禁用">当前（无 cwd）</button></div>
        <div id="content"></div>
      </div>
    </section>
  </main>
</div>
<div id="drawerHost"></div>
<script>
const exact=n=>n.toLocaleString('en-US'), millions=n=>(n/1e6).toFixed(2).replace(/\.?0+$/,'')+' M';
const data={total:12584291,input:8234512,output:2759310,cache:1580469,cost:18.42,calls:428};
const daily=[['07-09',1824320,2.18],['07-10',2740188,3.84],['07-11',3912604,5.17],['07-12',2108442,2.93],['07-13',4860901,6.42],['07-14',3327810,4.81],['07-15',2786026,3.07]];let chartMode='line', metricMode='tokens';
function icon(){return '<svg class="icon" viewBox="0 0 24 24"><path d="M3 18l5-6 4 3 7-9"/><path d="M18 6h1v1"/><path d="M4 21h17"/></svg>'}
function tokens(label,n){return `<div class="token-row"><label>${label}</label><span class="exact">${exact(n)}</span><span class="m">${millions(n)}</span></div>`}
function chartValue(d){return metricMode==='cost'?d[2]:d[1]} function chartDisplay(d){return metricMode==='cost'?`$${d[2].toFixed(2)}`:`${exact(d[1])} tokens · ${millions(d[1])}`} function chartMarkup(){const values=daily.map(chartValue), max=Math.max(...values);if(chartMode==='bars')return `<div class="bars" aria-label="按日${metricMode==='cost'?'费用':'Token 使用量'}柱状图">${daily.map((d)=>`<div class="barrow" tabindex="0" aria-label="2026-${d[0]} ${chartDisplay(d)}" onmouseenter="showChartTip('${d[0]}',${d[1]},${d[2]})" onfocus="showChartTip('${d[0]}',${d[1]},${d[2]})"><span>${d[0]}</span><div class="bar"><i style="width:${(chartValue(d)/max*100).toFixed(1)}%"></i></div><span class="number">${chartDisplay(d)}</span></div>`).join('')}</div>`;const xs=[44,104,164,224,284,344,404], ys=values.map(v=>190-(v/max)*142), points=ys.map((y,i)=>`${xs[i]},${y.toFixed(1)}`).join(' ');return `<svg class="line-chart" viewBox="0 0 448 220" role="img" aria-label="每日${metricMode==='cost'?'费用':'Token 使用量'}折线趋势"><line class="line-grid" x1="44" y1="48" x2="420" y2="48"/><line class="line-grid" x1="44" y1="95" x2="420" y2="95"/><line class="line-grid" x1="44" y1="142" x2="420" y2="142"/><line class="line-grid" x1="44" y1="190" x2="420" y2="190"/><text class="line-axis" x="5" y="52">${metricMode==='cost'?'$6':'5M'}</text><text class="line-axis" x="5" y="99">${metricMode==='cost'?'$4':'3.3M'}</text><text class="line-axis" x="5" y="146">${metricMode==='cost'?'$2':'1.7M'}</text><text class="line-axis" x="18" y="194">$0</text><polygon class="line-area" points="44,190 ${points} 404,190"/><polyline class="line-path" points="${points}"/>${daily.map((d,i)=>`<circle class="line-point" cx="${xs[i]}" cy="${ys[i].toFixed(1)}" r="4" tabindex="0" aria-label="2026-${d[0]} ${chartDisplay(d)}" onmouseenter="showChartTip('${d[0]}',${d[1]},${d[2]})" onfocus="showChartTip('${d[0]}',${d[1]},${d[2]})"/>`).join('')}<text class="line-axis" x="34" y="211">07-09</text><text class="line-axis" x="154" y="211">07-11</text><text class="line-axis" x="274" y="211">07-13</text><text class="line-axis" x="394" y="211" text-anchor="end">07-15</text></svg>`}
function showChartTip(day,tokensValue,cost){const t=document.getElementById('chartTooltip');t.innerHTML=metricMode==='cost'?`<b>2026-${day} · 费用趋势</b><p><span>费用</span><strong>$${cost.toFixed(2)}</strong></p><p><span>使用量</span><strong>${exact(tokensValue)} tokens</strong></p><p><span>M 换算</span><strong>${millions(tokensValue)}</strong></p>`:`<b>2026-${day} · 使用量趋势</b><p><span>使用量</span><strong>${exact(tokensValue)} tokens</strong></p><p><span>M 换算</span><strong>${millions(tokensValue)}</strong></p><p><span>费用</span><strong>$${cost.toFixed(2)}</strong></p>`}
function setChartMode(mode){chartMode=mode;render()} function setMetricMode(mode){metricMode=mode;render()}
function render(){document.getElementById('content').innerHTML=`
