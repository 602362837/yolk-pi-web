<!doctype html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Models 端点同步模型列表 · UI Prototype</title>
<style>
:root{--bg:#1a1a1a;--bg-panel:#242424;--bg-hover:#2e2e2e;--bg-selected:#383838;--border:#3a3a3a;--text:#e8e8e8;--text-muted:#9ca3af;--text-dim:#6b7280;--accent:#60a5fa;--accent-hover:#93c5fd;--danger:#f87171;--warning:#fbbf24;--success:#4ade80;--font-mono:'SFMono-Regular',Consolas,'Liberation Mono','PingFang SC',monospace}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#111;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC',sans-serif;font-size:14px}button,input,select{font:inherit}button{color:inherit}.mono,code{font-family:var(--font-mono)}
.prototype-bar{position:sticky;top:0;z-index:3000;padding:10px 14px;border-bottom:1px solid #303030;background:rgba(17,17,17,.96);backdrop-filter:blur(12px)}.prototype-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}.prototype-title{font-size:13px;font-weight:750}.prototype-note{font-size:11px;color:var(--text-muted)}.scene-tabs{display:flex;gap:6px;overflow:auto;padding-bottom:2px;scrollbar-width:thin}.scene-tab,.mini-tab{flex:0 0 auto;padding:5px 9px;border:1px solid var(--border);border-radius:6px;background:var(--bg-panel);color:var(--text-muted);font-size:11px;cursor:pointer}.scene-tab:hover,.mini-tab:hover{background:var(--bg-hover);color:var(--text)}.scene-tab.active,.mini-tab.active{border-color:var(--accent);background:rgba(96,165,250,.13);color:var(--accent);font-weight:700}.viewport{min-height:calc(100vh - 92px);padding:24px;display:grid;place-items:center;background:radial-gradient(circle at 50% 15%,#202734 0,transparent 38%),#111}.viewport.mobile-preview{width:375px;min-height:760px;margin:18px auto;padding:0;overflow:hidden;border:1px solid #4b5563;border-radius:14px;box-shadow:0 30px 80px rgba(0,0,0,.55)}
.overlay{position:relative;width:100%;min-height:690px;display:grid;place-items:center;background:rgba(0,0,0,.34)}.models-modal{width:860px;height:min(720px,78vh);min-height:610px;display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--border);border-radius:10px;background:var(--bg);box-shadow:0 8px 32px rgba(0,0,0,.45)}.modal-header,.modal-footer{flex:0 0 auto;display:flex;align-items:center;padding:12px 18px;border-color:var(--border)}.modal-header{justify-content:space-between;border-bottom:1px solid var(--border)}.header-title{display:flex;align-items:baseline;gap:10px}.header-title strong{font-size:15px}.header-title code{font-size:11px;color:var(--text-muted)}.icon-btn{width:28px;height:28px;border:0;background:transparent;color:var(--text-muted);border-radius:5px;cursor:pointer;font-size:20px}.icon-btn:hover{background:var(--bg-hover)}.split{display:flex;flex:1;min-height:0}.tree{width:210px;flex:0 0 210px;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--bg-panel)}.tree-scroll{flex:1;overflow:auto;padding:8px 6px}.tree-row{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:5px;color:var(--text-muted);font-size:12px}.tree-row.selected{background:var(--bg-selected);color:var(--text);font-weight:600}.tree-row.model{padding:5px 8px 5px 26px;font-size:11px}.tree-row .chip{margin-left:auto}.tree-add{padding:8px 6px;border-top:1px solid var(--border)}.tree-add button{width:100%;padding:6px;border:1px dashed var(--border);border-radius:5px;background:none;color:var(--text-muted);font-size:12px}.detail{flex:1;min-width:0;overflow:auto;padding:20px}.detail-stack{display:flex;flex-direction:column;gap:16px}.section-kicker{font-size:11px;font-weight:650;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em}.title-row{display:flex;justify-content:space-between;align-items:center}.delete{padding:3px 8px;border:1px solid rgba(239,68,68,.3);border-radius:4px;background:none;color:#ef4444;font-size:11px}.field{display:flex;flex-direction:column;gap:4px}.field label{font-size:11px;color:var(--text-muted);font-weight:500}.input,.select{width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:5px;background:var(--bg-panel);color:var(--text);font-size:12px;outline:none}.input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(96,165,250,.16)}.secret{letter-spacing:2px}.discovery{padding:13px;border:1px solid var(--border);border-radius:7px;background:linear-gradient(135deg,rgba(96,165,250,.065),rgba(96,165,250,.018));display:flex;flex-direction:column;gap:10px}.discovery-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.discovery-title{font-size:12px;font-weight:700}.discovery-copy{margin-top:4px;max-width:500px;color:var(--text-muted);font-size:11px;line-height:1.5}.tags{display:flex;gap:5px;flex-wrap:wrap}.tag,.chip{display:inline-flex;align-items:center;padding:2px 6px;border:1px solid var(--border);border-radius:999px;background:var(--bg-panel);color:var(--text-muted);font-size:10px;white-space:nowrap}.tag.safe,.chip.new{border-color:rgba(74,222,128,.35);background:rgba(74,222,128,.08);color:var(--success)}.tag.confirm{border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.07);color:var(--warning)}.chip.existing{color:var(--text-dim)}.reason{display:flex;align-items:flex-start;gap:7px;padding:8px 9px;border:1px solid rgba(251,191,36,.25);border-radius:5px;background:rgba(251,191,36,.055);color:#d6b965;font-size:11px;line-height:1.45}.reason.danger{border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.06);color:#fca5a5}.actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.btn{min-height:31px;padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text-muted);cursor:pointer;font-size:12px;font-weight:600}.btn:hover:not(:disabled){background:var(--bg-hover);color:var(--text)}.btn.primary{border-color:var(--accent);background:var(--accent);color:#fff}.btn.primary:hover:not(:disabled){background:var(--accent-hover);color:#111}.btn.success{border-color:#15803d;background:#16a34a;color:#fff}.btn:disabled{opacity:.48;cursor:not-allowed}.inline-help{color:var(--text-dim);font-size:10px}.modal-footer{justify-content:flex-end;gap:10px;border-top:1px solid var(--border)}.save-note{margin-right:auto;color:var(--warning);font-size:11px}
.secondary-layer{position:absolute;inset:0;z-index:20;display:grid;place-items:center;padding:24px;background:rgba(0,0,0,.58)}.preview-modal{width:720px;max-height:min(650px,calc(100vh - 80px));display:flex;flex-direction:column;overflow:hidden;border:1px solid #4a4a4a;border-radius:10px;background:var(--bg);box-shadow:0 18px 60px rgba(0,0,0,.65)}.preview-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border)}.preview-title{min-width:0}.preview-title strong{display:block;font-size:15px}.preview-title code{display:block;max-width:500px;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-muted);font-size:11px}.preview-body{min-height:360px;display:flex;flex-direction:column;overflow:hidden}.summary{display:grid;grid-template-columns:repeat(3,110px) 1fr;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg-panel)}.metric{padding:7px 9px;border:1px solid var(--border);border-radius:6px;background:var(--bg)}.metric span{display:block;color:var(--text-dim);font-size:10px}.metric b{display:block;margin-top:2px;font-size:16px}.safe-line{align-self:center;justify-self:end;color:var(--success);font-size:11px}.toolbar{display:flex;align-items:center;gap:7px;padding:10px 16px;border-bottom:1px solid var(--border)}.search{flex:1;min-width:140px}.toolbar .btn{min-height:29px;padding:4px 9px;font-size:11px}.selected-count{color:var(--text-muted);font-size:11px;white-space:nowrap}.model-list{flex:1;min-height:210px;overflow:auto}.model-row{display:grid;grid-template-columns:30px minmax(0,1fr) 120px 78px;align-items:center;gap:8px;min-height:42px;padding:7px 16px;border-bottom:1px solid rgba(58,58,58,.72)}.model-row:hover{background:var(--bg-hover)}.model-id{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}.owned{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-dim);font-size:10px}.check{appearance:none;width:16px;height:16px;margin:0;border:1px solid var(--border);border-radius:5px;background:var(--bg);display:grid;place-content:center;cursor:pointer}.check:checked{border-color:var(--accent);background:linear-gradient(135deg,var(--accent),var(--accent-hover))}.check:checked:after{content:'✓';color:white;font-size:11px;font-weight:900}.check:disabled{opacity:.38;cursor:not-allowed}.preview-footer{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:11px 16px;border-top:1px solid var(--border);background:var(--bg-panel)}.state-center{flex:1;min-height:360px;display:grid;place-items:center;padding:32px;text-align:center}.state-box{max-width:480px}.state-icon{width:44px;height:44px;margin:0 auto 12px;display:grid;place-items:center;border:1px solid var(--border);border-radius:50%;background:var(--bg-panel);color:var(--text-muted);font-size:20px}.state-box h3{margin:0 0 6px;font-size:14px}.state-box p{margin:0;color:var(--text-muted);font-size:12px;line-height:1.55}.state-box .actions{justify-content:center;margin-top:16px}.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}.error-switch{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:18px}.error-panel{padding:12px;border:1px solid rgba(248,113,113,.3);border-radius:7px;background:rgba(248,113,113,.06);text-align:left}.error-panel strong{display:block;color:#fca5a5;font-size:12px}.error-panel p{margin-top:5px}.busy-strip{display:flex;align-items:center;gap:8px;padding:9px 16px;border-bottom:1px solid rgba(96,165,250,.25);background:rgba(96,165,250,.07);color:#bfdbfe;font-size:11px}.success-mark{width:52px;height:52px;margin:0 auto 14px;display:grid;place-items:center;border:1px solid rgba(74,222,128,.4);border-radius:50%;background:rgba(74,222,128,.09);color:var(--success);font-size:25px}.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:18px 0}.result-item{padding:10px;border:1px solid var(--border);border-radius:6px;background:var(--bg-panel)}.result-item b{display:block;font-size:17px}.result-item span{color:var(--text-muted);font-size:10px}.result-safe{color:var(--success)!important}
.prompt-layer{position:absolute;inset:0;z-index:30;display:grid;place-items:center;padding:24px;background:rgba(0,0,0,.64)}.prompt{width:480px;max-width:calc(100% - 24px);overflow:hidden;border:1px solid var(--border);border-radius:8px;background:var(--bg);box-shadow:0 18px 52px rgba(0,0,0,.55)}.prompt-content{padding:20px}.prompt h2{margin:0;font-size:16px}.prompt p{margin:10px 0 0;color:var(--text-muted);font-size:13px;line-height:1.58}.prompt strong{color:var(--text)}.prompt-actions{display:flex;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid var(--border);background:var(--bg-panel)}
.variant-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}.hidden{display:none!important}@keyframes spin{to{transform:rotate(360deg)}}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.viewport.mobile-preview .overlay{min-height:758px;align-items:stretch}.viewport.mobile-preview .models-modal{width:100%;height:758px;min-height:0;border:0;border-radius:0}.viewport.mobile-preview .header-title code{display:none}.viewport.mobile-preview .split{flex-direction:column;overflow:auto}.viewport.mobile-preview .tree{width:100%;flex:0 0 185px;border-right:0;border-bottom:1px solid var(--border)}.viewport.mobile-preview .tree-scroll{display:grid;grid-template-columns:1fr 1fr;align-content:start}.viewport.mobile-preview .tree-row.model{display:none}.viewport.mobile-preview .detail{padding:14px}.viewport.mobile-preview .modal-footer{padding:9px 12px}.viewport.mobile-preview .save-note{display:none}.viewport.mobile-preview .secondary-layer{position:absolute;padding:0}.viewport.mobile-preview .preview-modal{width:100%;height:100%;max-height:none;border:0;border-radius:0}.viewport.mobile-preview .preview-body{min-height:0;flex:1}.viewport.mobile-preview .summary{grid-template-columns:repeat(3,1fr);padding:10px 12px}.viewport.mobile-preview .safe-line{grid-column:1/-1;justify-self:start}.viewport.mobile-preview .toolbar{flex-wrap:wrap;padding:9px 12px}.viewport.mobile-preview .toolbar .search{flex-basis:100%}.viewport.mobile-preview .model-row{grid-template-columns:26px minmax(0,1fr) 68px;padding:7px 12px}.viewport.mobile-preview .owned{display:none}.viewport.mobile-preview .preview-footer{flex-direction:column-reverse;align-items:stretch;padding:10px 12px}.viewport.mobile-preview .preview-footer .btn{width:100%}.viewport.mobile-preview .prompt-layer{padding:12px}.viewport.mobile-preview .prompt-actions{flex-direction:column-reverse;padding:12px}.viewport.mobile-preview .prompt-actions .btn{width:100%}.viewport.mobile-preview .discovery-head{flex-direction:column}.viewport.mobile-preview .metric{padding:6px}.viewport.mobile-preview .metric b{font-size:14px}
@media(max-width:700px){.prototype-note{display:none}.viewport:not(.mobile-preview){padding:0}.models-modal{width:100vw;height:calc(100vh - 86px);min-height:620px;border-radius:0}.tree{width:180px;flex-basis:180px}.secondary-layer{padding:8px}.preview-modal{width:100%}}
</style>
</head>
<body>
<header class="prototype-bar">
  <div class="prototype-head"><div><div class="prototype-title">Models · 从端点同步模型列表</div><div class="prototype-note">交互原型：点击场景切换；Mixed 场景支持搜索、勾选、全选、清空与确认。</div></div><span class="tag confirm">待用户审批</span></div>
  <nav class="scene-tabs" aria-label="原型场景">
    <button class="scene-tab active" data-scene="eligible">1 可同步</button><button class="scene-tab" data-scene="disabled">2 禁用原因</button><button class="scene-tab" data-scene="fixed">3 Built-in / Fixed</button><button class="scene-tab" data-scene="loading">4 Loading</button><button class="scene-tab" data-scene="empty">5 Empty</button><button class="scene-tab" data-scene="mixed">6 Mixed</button><button class="scene-tab" data-scene="existing">7 All existing</button><button class="scene-tab" data-scene="confirm-selective">8 确认所选</button><button class="scene-tab" data-scene="confirm-all">9 确认全部</button><button class="scene-tab" data-scene="success">10 Success</button><button class="scene-tab" data-scene="errors">11 Errors / Busy</button><button class="scene-tab" data-scene="mobile">12 375px</button>
  </nav>
</header>
<main id="viewport" class="viewport"><div class="overlay" id="overlay"></div></main>
<script>
const rows=[
{id:'gpt-4.1',owned:'openai',status:'existing'},
{id:'gpt-4.1-mini',owned:'openai',status:'new'},
{id:'gpt-4.1-nano',owned:'openai',status:'new'},
{id:'o3',owned:'openai',status:'existing'},
{id:'o3-mini',owned:'openai',status:'new'},
{id:'vendor/reasoning-model-with-an-extremely-long-identifier-2026-07-preview',owned:'private-gateway',status:'new'},
{id:'text-embedding-3-large',owned:'openai',status:'existing'},
{id:'custom-chat-v2',owned:'private-gateway',status:'new'}];
let scene='eligible',disabledVariant='dirty',errorVariant='auth';
const overlay=document.getElementById('overlay'),viewport=document.getElementById('viewport');
function button(label,cls=''){return `<button class="btn ${cls}">${label}</button>`}
function shell(options={}){const showDiscovery=options.showDiscovery!==false;const disabled=!!options.disabled;const reason=options.reason||'';return `<section class="models-modal" aria-label="Models 配置原型"><header class="modal-header"><div class="header-title"><strong>Models</strong><code>~/.pi/agent/models.json</code></div><button class="icon-btn" aria-label="关闭">×</button></header><div class="split"><aside class="tree"><div class="tree-scroll"><div class="tree-row selected"><span>▣</span><span class="mono">local-openai</span></div><div class="tree-row model mono">gpt-4.1</div><div class="tree-row model mono">o3</div><div class="tree-row model mono">text-embedding-3-large</div><div class="tree-row"><span>▣</span><span class="mono">another-provider</span></div><div class="tree-row"><span>◉</span><span>OpenAI</span><span class="chip">managed</span></div></div><div class="tree-add"><button>+ Add provider</button></div></aside><div class="detail"><div class="detail-stack"><div class="title-row"><div class="section-kicker">Provider</div><button class="delete">Delete</button></div><div class="field"><label>Provider name</label><input class="input mono" value="local-openai" readonly></div><div class="field"><label>Base URL</label><input class="input mono" value="${options.baseUrl||'http://localhost:11434/v1'}" readonly></div><div class="field"><label>API Key</label><input class="input mono secret" value="••••••••••••••" readonly aria-label="已保存的 API Key（原型不展示内容）"></div><div class="field"><label>API</label><div class="select mono">${options.api||'openai-completions'}　⌄</div></div>${showDiscovery?discovery(disabled,reason):`<div class="reason">此条目属于 Built-in / fixed provider。同步入口不展示；内置目录与固定扩展继续使用各自的模型来源。</div>`}</div></div></div><footer class="modal-footer"><span class="save-note">${options.dirty?'● 有未保存更改':''}</span>${button('Cancel')}${button(options.dirty?'Save changes':'Save','primary')}</footer></section>`}
function discovery(disabled,reason){return `<section class="discovery"><div class="discovery-head"><div><div class="discovery-title">从端点同步模型</div><div class="discovery-copy">读取已保存 Base URL 的 OpenAI-compatible <span class="mono">/models</span> 列表。只新增模型 ID，不覆盖已有价格和手工配置。</div></div><div class="tags"><span class="tag safe">仅新增</span><span class="tag confirm">需确认</span></div></div>${reason?`<div class="reason">ⓘ <span>${reason}</span></div>`:''}<div class="actions"><button id="open-preview" class="btn primary" ${disabled?'disabled':''}>预览远端模型</button><span class="inline-help">不会删除本地模型，也不会写入远端返回的能力或价格字段。</span></div></section>`}
function previewChrome(content,footer='',counts={remote:8,newCount:5,existing:3}){return `<div class="secondary-layer"><section class="preview-modal" role="dialog" aria-modal="true" aria-labelledby="preview-title"><header class="preview-header"><div class="preview-title"><strong id="preview-title">从端点同步模型</strong><code>local-openai</code></div><button class="icon-btn" aria-label="关闭预览">×</button></header><div class="preview-body"><div class="summary"><div class="metric"><span>远端</span><b>${counts.remote}</b></div><div class="metric"><span>新增</span><b>${counts.newCount}</b></div><div class="metric"><span>已存在</span><b>${counts.existing}</b></div><div class="safe-line">✓ 只会写入新增模型 ID</div></div>${content}</div>${footer}</section></div>`}
function loading(){return previewChrome(`<div class="state-center"><div class="state-box"><div class="state-icon"><span class="spinner"></span></div><h3>正在读取远端模型列表…</h3><p>使用已保存的提供商配置请求模型目录。不会展示凭据、Headers 或上游原始响应。</p><div class="actions">${button('取消')}</div></div></div>`,'',{remote:'—',newCount:'—',existing:'—'})}
function empty(){return previewChrome(`<div class="state-center"><div class="state-box"><div class="state-icon">∅</div><h3>远端没有返回模型</h3><p>端点返回了可识别的 OpenAI 模型列表，但列表为空。没有发生任何写入。</p><div class="actions">${button('重新读取','primary')}</div></div></div>`,footerCancel(),{remote:0,newCount:0,existing:0})}
function allExisting(){return previewChrome(`<div class="state-center"><div class="state-box"><div class="state-icon">✓</div><h3>所有远端模型都已存在</h3><p>本地配置已经包含远端返回的 3 个模型。已有价格、手工字段与 modelOverrides 保持不变。</p><div class="actions">${button('重新读取')}</div></div></div>`,footerCancel(),{remote:3,newCount:0,existing:3})}
function footerCancel(){return `<footer class="preview-footer">${button('取消')}</footer>`}
function mixed(){return previewChrome(`<div class="toolbar"><input id="search" class="input search mono" placeholder="搜索模型 ID…" aria-label="搜索模型 ID"><button id="select-all" class="btn">全选新增</button><button id="clear-all" class="btn">清空选择</button><span id="selected-count" class="selected-count">已选 5</span></div><div id="model-list" class="model-list">${rows.map((r,i)=>`<label class="model-row" data-id="${r.id.toLowerCase()}"><input class="check model-check" type="checkbox" ${r.status==='new'?'checked':'disabled'} data-status="${r.status}" aria-label="${r.status==='new'?'选择':'已存在，不能重复选择'} ${r.id}"><code class="model-id" title="${r.id}">${r.id}</code><span class="owned">${r.owned}</span><span class="chip ${r.status}">${r.status==='new'?'新增':'已存在'}</span></label>`).join('')}</div>`,`<footer class="preview-footer">${button('取消')}<button id="write-selected" class="btn primary">写入所选（5）</button><button id="write-all" class="btn success">全部新增并写入（5）</button></footer>`)}
function prompt(all=false){const n=all?5:3;return `<div class="prompt-layer"><section class="prompt" role="alertdialog" aria-modal="true" aria-labelledby="prompt-title"><div class="prompt-content"><h2 id="prompt-title">${all?`写入全部 ${n} 个新增模型？`:`确认写入 ${n} 个模型？`}</h2><p>将向 <strong class="mono">local-openai</strong> 追加 <strong>${n}</strong> 个模型 ID。<br><br>只追加 model ID；已有模型、价格、手工字段和 <span class="mono">modelOverrides</span> 不会被覆盖；远端缺失的本地模型不会删除。</p></div><footer class="prompt-actions">${button(all?'取消':'返回预览')} ${button(all?'全部写入':'确认写入','primary')}</footer></section></div>`}
function success(){return previewChrome(`<div class="state-center"><div class="state-box"><div class="success-mark">✓</div><h3>已新增 5 个模型</h3><p>Models 配置已重新载入，当前提供商保持选中。</p><div class="result-grid"><div class="result-item"><b>5</b><span>已新增</span></div><div class="result-item"><b>3</b><span>已跳过已存在</span></div></div><p class="result-safe">✓ 没有覆盖已有配置，也没有删除本地模型</p><div class="actions">${button('完成','primary')}</div></div></div>`,'',{remote:8,newCount:5,existing:3})}
const errorData={auth:['端点拒绝了凭据','请检查 API Key 或自定义认证 Header 后重试。'],timeout:['读取模型列表超时','请检查模型服务状态或网络连接后重试。'],invalid:['无法识别模型列表','端点返回的不是可识别的 OpenAI 模型列表，或响应超过安全读取上限。'],stale:['Models 配置已发生变化','此预览已过期。请重新预览后再写入，系统不会基于旧列表盲写。'],busy:['正在写入模型配置','请求处理中，操作按钮已禁用以防止重复提交。']};
function errors(){const [title,msg]=errorData[errorVariant];const busy=errorVariant==='busy';return previewChrome(`${busy?'<div class="busy-strip"><span class="spinner"></span>正在安全合并并验证配置，请勿重复提交…</div>':''}<div class="state-center"><div class="state-box"><div class="error-switch">${Object.keys(errorData).map(k=>`<button class="mini-tab ${k===errorVariant?'active':''}" data-error="${k}">${({auth:'认证失败',timeout:'超时/网络',invalid:'无效/过大',stale:'预览过期',busy:'Apply busy'})[k]}</button>`).join('')}</div><div class="error-panel" role="alert"><strong>${busy?'处理中':title}</strong><p>${msg}</p></div><div class="actions">${busy?button('写入中…','primary'):`${button(errorVariant==='stale'?'重新预览':'重试','primary')}${button('取消')}`}</div></div></div>`,busy?`<footer class="preview-footer">${button('取消')}<button class="btn primary" disabled>写入中…</button><button class="btn success" disabled>全部新增并写入（5）</button></footer>`:footerCancel())}
function disabledScene(){const variants={dirty:{label:'Dirty draft',reason:'请先保存当前 Models 更改，再从已保存的端点读取模型。',dirty:true},unsaved:{label:'未保存 provider',reason:'请先保存提供商，再预览远端模型。'},base:{label:'无效 Base URL',reason:'请先填写并保存有效的 http(s) Base URL。',baseUrl:'not-a-valid-url'},protocol:{label:'非 OpenAI API',reason:'仅支持 OpenAI-compatible API（openai-completions / openai-responses）。',api:'anthropic-messages'}};const v=variants[disabledVariant];return shell({disabled:true,reason:v.reason,dirty:v.dirty,baseUrl:v.baseUrl,api:v.api})+`<div style="position:absolute;left:50%;bottom:24px;transform:translateX(-50%);z-index:25;display:flex;gap:6px;padding:7px;border:1px solid var(--border);border-radius:8px;background:#181818;box-shadow:0 8px 24px #000">${Object.entries(variants).map(([k,x])=>`<button class="mini-tab ${k===disabledVariant?'active':''}" data-disabled="${k}">${x.label}</button>`).join('')}</div>`}
function render(){viewport.classList.toggle('mobile-preview',scene==='mobile');let html='';if(scene==='eligible')html=shell();if(scene==='disabled')html=disabledScene();if(scene==='fixed')html=shell({showDiscovery:false});if(['loading','empty','mixed','existing','confirm-selective','confirm-all','success','errors','mobile'].includes(scene)){html=shell();if(scene==='loading')html+=loading();if(scene==='empty')html+=empty();if(scene==='mixed'||scene==='mobile')html+=mixed();if(scene==='existing')html+=allExisting();if(scene==='confirm-selective')html+=mixed()+prompt(false);if(scene==='confirm-all')html+=mixed()+prompt(true);if(scene==='success')html+=success();if(scene==='errors')html+=errors()}overlay.innerHTML=html;bind()}
function bind(){document.querySelectorAll('[data-disabled]').forEach(b=>b.onclick=()=>{disabledVariant=b.dataset.disabled;render()});document.querySelectorAll('[data-error]').forEach(b=>b.onclick=()=>{errorVariant=b.dataset.error;render()});const open=document.getElementById('open-preview');if(open&&!open.disabled)open.onclick=()=>{scene='mixed';syncTabs();render()};const search=document.getElementById('search');if(search)search.oninput=()=>document.querySelectorAll('.model-row').forEach(r=>r.classList.toggle('hidden',!r.dataset.id.includes(search.value.toLowerCase())));const checks=[...document.querySelectorAll('.model-check[data-status="new"]')];const update=()=>{const n=checks.filter(c=>c.checked).length;const count=document.getElementById('selected-count'),write=document.getElementById('write-selected');if(count)count.textContent=`已选 ${n}`;if(write){write.textContent=`写入所选（${n}）`;write.disabled=n===0}};checks.forEach(c=>c.onchange=update);const sa=document.getElementById('select-all');if(sa)sa.onclick=()=>{checks.forEach(c=>c.checked=true);update()};const ca=document.getElementById('clear-all');if(ca)ca.onclick=()=>{checks.forEach(c=>c.checked=false);update()};const ws=document.getElementById('write-selected');if(ws)ws.onclick=()=>{if(!ws.disabled){scene='confirm-selective';syncTabs();render()}};const wa=document.getElementById('write-all');if(wa)wa.onclick=()=>{scene='confirm-all';syncTabs();render()}}
function syncTabs(){document.querySelectorAll('.scene-tab').forEach(b=>b.classList.toggle('active',b.dataset.scene===scene))}
document.querySelectorAll('.scene-tab').forEach(b=>b.onclick=()=>{scene=b.dataset.scene;syncTabs();render()});render();
</script>
</body>
</html>
