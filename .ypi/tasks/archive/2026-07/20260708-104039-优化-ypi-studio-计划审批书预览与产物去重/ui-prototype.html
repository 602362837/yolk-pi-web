<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YPI Studio 计划审批书预览与产物去重 - UI 交互原型</title>
  <style>
    :root {
      --bg: #090d16;
      --bg-panel: #0d1527;
      --bg-card: #13223f;
      --bg-hover: #1b2f54;
      --bg-selected: #1e3a6d;
      --border: #263c65;
      --border-focus: #3b82f6;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      width: 100%;
      max-width: 1000px;
      margin-bottom: 16px;
      padding: 16px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--accent-hover);
    }

    header p {
      color: var(--text-muted);
      font-size: 12px;
      margin-bottom: 12px;
    }

    .scenario-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-scenario {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-scenario.active {
      background: var(--accent);
      border-color: var(--accent-hover);
      color: #fff;
    }

    .btn-scenario:hover:not(.active) {
      background: var(--bg-hover);
      color: var(--text);
    }

    .container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      width: 100%;
      max-width: 1000px;
    }

    /* Simulated App Shell */
    .studio-panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 580px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .task-title-area {
      min-width: 0;
      flex: 1;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .task-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      text-transform: uppercase;
    }

    .badge-awaiting {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .badge-planning {
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent-hover);
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .badge-done {
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .badge-required {
      background: rgba(239, 68, 68, 0.1);
      color: var(--error);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .badge-optional {
      background: rgba(148, 163, 184, 0.1);
      color: var(--text-muted);
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    .task-key {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .header-actions {
      display: flex;
      gap: 6px;
    }

    .btn-small {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }

    .btn-small:hover {
      background: var(--bg-hover);
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--border-focus);
      color: #fff;
    }

    .btn-primary:hover {
      background: #2563eb;
    }

    /* Tab Buttons */
    .tab-bar {
      display: flex;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
      overflow-x: auto;
    }

    .tab-button {
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      border-radius: 6px;
      white-space: nowrap;
      position: relative;
      transition: all 0.2s;
    }

    .tab-button:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    .tab-button.active {
      background: var(--bg-selected);
      color: var(--text);
      font-weight: 600;
    }

    .tab-button.active-glowing::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 10%;
      width: 80%;
      height: 2px;
      background: var(--warning);
      box-shadow: 0 0 8px var(--warning);
    }

    /* Notice Banner */
    .notice {
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 12px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.4;
    }

    .notice-info {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.2);
      color: var(--accent-hover);
    }

    .notice-warning {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
      color: var(--warning);
    }

    .notice-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--error);
    }

    /* Section card styles */
    .section-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Details Rows */
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px;
    }

    .detail-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 11px;
    }

    .detail-label {
      color: var(--text-dim);
    }

    .detail-value {
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Markdown Body Simulation */
    .markdown-body {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      color: #cbd5e1;
      font-size: 12.5px;
      line-height: 1.6;
    }

    .markdown-body h1 {
      font-size: 18px;
      color: #fff;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }

    .markdown-body h2 {
      font-size: 14px;
      color: #fff;
      margin-top: 16px;
      margin-bottom: 8px;
    }

    .markdown-body ul {
      margin-left: 20px;
      margin-bottom: 12px;
    }

    .markdown-body li {
      margin-bottom: 4px;
    }

    .markdown-body p {
      margin-bottom: 10px;
    }

    .markdown-body code {
      font-family: var(--font-mono);
      background: rgba(255, 255, 255, 0.08);
      padding: 2px 4px;
      border-radius: 3px;
      font-size: 11px;
      color: #e2e8f0;
    }

    /* Markdown Links */
    .markdown-body a {
      color: var(--accent-hover);
      text-decoration: none;
      border-bottom: 1px dashed var(--accent-hover);
      cursor: pointer;
      position: relative;
    }

    .markdown-body a:hover {
      color: #93c5fd;
      border-bottom-style: solid;
    }

    /* Tooltip */
    .markdown-body a::after {
      content: attr(data-tip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%) translateY(-4px);
      background: #000;
      color: #fff;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
      z-index: 10;
      border: 1px solid var(--border);
    }

    .markdown-body a:hover::after {
      opacity: 1;
    }

    /* Toast Notification */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: #1e293b;
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 6px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast-error {
      border-left-color: var(--error);
      background: #2a1b1b;
    }

    .toast-success {
      border-left-color: var(--success);
      background: #172a22;
    }

    /* Simulated File Viewer Overlay */
    .file-viewer-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(2, 6, 23, 0.85);
      z-index: 999;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .file-viewer-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .file-viewer-container {
      width: 90%;
      max-width: 800px;
      height: 80%;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      transform: scale(0.95);
      transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .file-viewer-overlay.show .file-viewer-container {
      transform: scale(1);
    }

    .file-viewer-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-card);
      border-radius: 12px 12px 0 0;
    }

    .file-title {
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .file-path {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
    }

    .btn-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 4px;
    }

    .btn-close:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    .file-viewer-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: var(--bg);
    }

    .iframe-sandbox {
      width: 100%;
      height: 100%;
      border: none;
      background: #ffffff;
      border-radius: 4px;
    }

    .iframe-container {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .iframe-bar {
      background: #f1f5f9;
      color: #475569;
      padding: 6px 12px;
      font-size: 11px;
      border-radius: 4px 4px 0 0;
      border-bottom: 1px solid #cbd5e1;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .iframe-badge-sandbox {
      background: #e2e8f0;
      color: #64748b;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: bold;
    }

    /* Artifact Deduplication UI styling */
    .artifact-tabs-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .artifact-tab-strip {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .artifact-tab-button {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .artifact-tab-button:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    .artifact-tab-button.active {
      background: var(--bg-selected);
      border-color: var(--border-focus);
      color: var(--text);
      font-weight: 600;
    }

    .artifact-tab-button.completed::after {
      content: '✓';
      color: var(--success);
      font-weight: bold;
    }

    .dedupe-explanation {
      background: rgba(16, 185, 129, 0.05);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 6px;
      padding: 10px;
      font-size: 11.5px;
      color: #a7f3d0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .dedupe-explanation span {
      font-weight: bold;
    }

    .dedupe-list {
      margin-left: 16px;
    }
  </style>
</head>

  <header>
    <h1>🎨 YPI Studio 计划审批书预览与产物去重原型</h1>
    <p>
      此原型为 <strong>UI 设计员 (ui-designer)</strong> 交付的交互与视觉设计方案。请通过下方按钮切换不同场景以审阅实际效果。

    <div class="scenario-selector">

      <button class="btn-scenario" onclick="switchScenario('artifacts-dedupe')">场景 3: 产物 Tab 去重与排序效果</button>

  <main class="container">
    
    <!-- Simulated Studio Task Detail Panel -->
    <div class="studio-panel">

        <button id="tab-btn-implementation" class="tab-button" onclick="setTab('implementation')">实现 0/6</button>
        <button id="tab-btn-artifacts" class="tab-button" onclick="setTab('artifacts')">产物 7</button>

      <!-- Tab Content Area -->
      <div id="tab-content" style="display: flex; flex-direction: column; gap: 12px; flex: 1;">
        <!-- Dynamic content goes here -->
      </div>

    </div>

  </main>

  <!-- Simulating Toast Notifications -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Simulated File Viewer Overlay -->
  <div class="file-viewer-overlay" id="file-viewer">

      <div class="file-viewer-header">
        <div class="file-title">
          <span>📄 FileViewer</span>

      </div>
      <div class="file-viewer-body" id="viewer-content">

      </div>

      'prd.md': `<h1>PRD — YPI Studio 计划审批书预览与产物去重</h1>

    // Handles simulation of scenario change
    function switchScenario(scenario) {
      currentScenario = scenario;
      
      // Update Scenario buttons active class
      document.querySelectorAll('.btn-scenario').forEach(btn => btn.classList.remove('active'));
      const activeBtn = Array.from(document.querySelectorAll('.btn-scenario')).find(btn => 
        (scenario === 'awaiting-valid' && btn.innerText.includes('场景 1')) ||
        (scenario === 'planning-empty' && btn.innerText.includes('场景 2')) ||
        (scenario === 'artifacts-dedupe' && btn.innerText.includes('场景 3'))
      );
      if (activeBtn) activeBtn.classList.add('active');

      // Update Task detail header based on scenario
      const statusBadge = document.getElementById('task-status-badge');
      const phaseBadge = document.getElementById('task-phase-badge');
      const tabApproval = document.getElementById('tab-btn-approval');

      if (scenario === 'planning-empty') {
        statusBadge.innerText = 'planning';
        statusBadge.className = 'badge badge-planning';
        phaseBadge.innerText = '方案规划';
        phaseBadge.className = 'badge badge-planning';
        tabApproval.classList.remove('active-glowing');
        setTab('approval');
      } else if (scenario === 'awaiting-valid') {
        statusBadge.innerText = 'awaiting_approval';
        statusBadge.className = 'badge badge-awaiting';
        phaseBadge.innerText = '等待审批';
        phaseBadge.className = 'badge badge-awaiting';
        tabApproval.classList.add('active-glowing'); // Glowing to invite user to review
        setTab('approval');
      } else {
        // artifacts dedupe scenario
        statusBadge.innerText = 'awaiting_approval';
        statusBadge.className = 'badge badge-awaiting';
        phaseBadge.innerText = '等待审批';
        phaseBadge.className = 'badge badge-awaiting';
        tabApproval.classList.remove('active-glowing');
        setTab('artifacts');
      }
    }

    // Set Active Tab
    function setTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`tab-btn-${tab}`).classList.add('active');
      renderTabContent();
    }

    // Handle Markdown Click
    function handleMarkdownLink(path, label, isHtml = false) {
      // Security parsing rules check
      if (path.startsWith('http') || path.startsWith('https') || path.startsWith('/')) {
        showToast('error', `❌ 安全阻止：拒绝访问外部或绝对路径 ("${path}")`);
        return;
      }
      
      if (path.includes('..')) {
        showToast('error', `❌ 安全阻止：路径包含 ".." 越权逃逸风险 ("${path}")`);
        return;
      }

      // Legal task-relative paths
      const cleanPath = path.replace(/^\.\//, '');
      
      if (isHtml && cleanPath === 'ui-prototype.html') {
        showToast('success', `⚡ 安全检测通过：检测到合法 UI HTML 预览路径。`);
        openFileViewer(cleanPath, 'ui-prototype.html', true);
        return;
      }

      if (mockFiles[cleanPath] !== undefined) {
        showToast('success', `📂 成功读取任务内文件: ${cleanPath}`);
        openFileViewer(cleanPath, cleanPath, false);
      } else {
        showToast('error', `🔍 文件未找到: 当前任务目录下不存在 "${cleanPath}"`);
      }
    }

    // Select Artifact inside Artifacts Tab (Scenario 3)
    function selectArtifact(name, isHtml = false) {
      document.querySelectorAll('.artifact-tab-button').forEach(btn => btn.classList.remove('active'));
      const activeBtn = Array.from(document.querySelectorAll('.artifact-tab-button')).find(btn => btn.innerText.replace(' ✓', '') === name);
      if (activeBtn) activeBtn.classList.add('active');

      const titleName = document.getElementById('artifact-title-name');
      const filePath = document.getElementById('artifact-file-path');
      const markdownContent = document.getElementById('artifact-markdown-content');

      const isRequired = name !== 'ui.md' && name !== 'ui-prototype.html';
      titleName.innerHTML = `${name} · ${isRequired ? '必需' : '可选'}`;
      filePath.innerText = `.ypi/tasks/20260708-104039-优化-ypi-studio-计划审批书预览与产物去重/${name}`;

      if (isHtml) {
        markdownContent.innerHTML = `
          <div style="padding: 12px; background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 6px; margin-bottom: 12px; font-size: 12px;">
            ℹ️ <strong>HTML 静态网页原型文件</strong><br/>
            检测到当前产物为静态交互网页，建议使用<strong>独立沙箱预览</strong>或直接在新窗口安全打开。
          </div>
          <button class="btn-small btn-primary" onclick="handleMarkdownLink('./ui-prototype.html', 'ui-prototype.html', true)">⚡ 打开独立沙箱预览页 (安全 CSP & Sandbox)</button>
        `;
      } else {
        markdownContent.innerHTML = mockFiles[name] || `<h1>${name}</h1><p>（此处渲染该 Markdown 文件的内容文本）</p>`;
      }
    }

    // Open File Viewer Overlay
    function openFileViewer(path, label, isHtml) {
      const viewer = document.getElementById('file-viewer');
      const titlePath = document.getElementById('viewer-file-path');
      const content = document.getElementById('viewer-content');

      titlePath.innerText = `./${path}`;
      viewer.classList.add('show');

      if (isHtml) {
        // Simulation of sandbox CSP browser iframe
        content.innerHTML = `
          <div class="iframe-container">
            <div class="iframe-bar">
              <span class="iframe-badge-sandbox">CSP SANDBOX</span>
              <span>Secure preview for ${path}</span>
            </div>
            <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1e293b; color: #94a3b8; border: 1px solid var(--border); border-radius: 0 0 4px 4px; padding: 24px; text-align: center;">
              <span style="font-size: 24px; margin-bottom: 8px;">🖥️</span>
              <strong style="color: #fff; margin-bottom: 4px;">受限沙箱 iframe / 新窗口渲染成功</strong>
              <p style="font-size: 11px; max-width: 400px; margin-bottom: 16px;">
                在实际产品中，点击此处将通过受限的 Studio Task Preview API 打开独立页面渲染 HTML，或以极其严格的 sandbox csp 属性在 iframe 中加载，确保代码执行不会越权读取其他 Workspace 敏感数据。
              </p>
              <button class="btn-small btn-primary" onclick="showToast('info', '正在模拟 window.open() 打开安全渲染页...')">模拟 window.open 渲染原型</button>
            </div>
          </div>
        `;
      } else {
        content.innerHTML = mockFiles[path] || `<p>未找到该文件内容</p>`;
      }
    }

    // Close File Viewer
    function closeFileViewer() {
      document.getElementById('file-viewer').classList.remove('show');
    }

    // Toast Notification Maker
    function showToast(type, message) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type === 'error' ? 'toast-error' : type === 'success' ? 'toast-success' : ''}`;
      toast.innerHTML = `
        <span>${type === 'error' ? '🛑' : type === 'success' ? '✅' : 'ℹ️'}</span>
        <div>${message}</div>
      `;
      container.appendChild(toast);
      
      // Trigger animations
      setTimeout(() => toast.classList.add('show'), 50);
      
      // Destroy
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    // Run on startup
    renderTabContent();
  </script>
