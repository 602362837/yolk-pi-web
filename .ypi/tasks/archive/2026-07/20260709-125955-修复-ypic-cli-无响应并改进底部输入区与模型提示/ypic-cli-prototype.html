<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ypic CLI Terminal Interface - HTML Prototype</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg-panel: #161b22;
      --bg-card: #21262d;
      --bg-hover: #30363d;
      --border: #30363d;
      --border-focus: #58a6ff;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --text-dim: #484f58;
      --accent: #1f6feb;
      --accent-hover: #58a6ff;
      --success: #238636;
      --warning: #d29922;
      --error: #f85149;
      --terminal-bg: #010409;
      --terminal-text: #e6edf3;
      --font-mono: "Fira Code", "JetBrains Mono", Consolas, "PingFang SC", monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      width: 100%;
      max-width: 1100px;
      margin-bottom: 20px;
      padding: 16px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--accent-hover);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 span.tag {
      font-size: 11px;
      font-weight: normal;
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent-hover);
      padding: 2px 8px;
      border-radius: 12px;
      border: 1px solid rgba(88, 166, 255, 0.3);
    }

    header p {
      color: var(--text-muted);
      font-size: 12.5px;
      line-height: 1.5;
    }

    .scenario-tabs {
      display: flex;
      gap: 6px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s ease-in-out;
    }

    .tab-btn:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent-hover);
      color: #ffffff;
      box-shadow: 0 0 8px rgba(31, 111, 235, 0.4);
    }

    main {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
      }
    }

    /* Terminal Simulation Container */
    .terminal-container {
      background: var(--terminal-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 520px;
    }

    .terminal-header {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }

    .terminal-dots {
      display: flex;
      gap: 6px;
    }

    .terminal-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .terminal-dot.red { background: #ff5f56; }
    .terminal-dot.yellow { background: #ffbd2e; }
    .terminal-dot.green { background: #27c93f; }

    .terminal-title {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
    }

    .terminal-size {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .terminal-body {
      flex: 1;
      padding: 14px;
      overflow-y: auto;
      font-family: var(--font-mono);
      font-size: 12.5px;
      color: var(--terminal-text);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
    }

    .terminal-history {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow-y: auto;
      padding-bottom: 8px;
    }

    /* Terminal text elements */
    .t-banner {
      color: var(--warning);
      margin-bottom: 8px;
    }
    .t-cyan { color: #58a6ff; }
    .t-green { color: #3fb950; }
    .t-gray { color: #8b949e; }
    .t-yellow { color: #d29922; }
    .t-red { color: #f85149; }
    .t-magenta { color: #bc8cff; }
    .t-dim { color: #484f58; }
    
    .t-prompt {
      color: #58a6ff;
      font-weight: bold;
    }
    .t-input-cmd {
      color: #e6edf3;
    }
    .t-result-block {
      margin: 6px 0 12px 0;
      padding-left: 12px;
      border-left: 2px solid var(--border);
    }

    /* Fixed Bottom Input Area */
    .terminal-input-bar {
      border-top: 1px solid var(--border);
      background: var(--terminal-bg);
      display: flex;
      flex-direction: column;
    }

    .terminal-divider-line {
      height: 1px;
      background: var(--border);
      width: 100%;
    }

    .terminal-input-row {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      font-family: var(--font-mono);
      font-size: 12.5px;
      background: #090d16;
    }

    .terminal-prompt-prefix {
      color: #3fb950;
      margin-right: 8px;
      font-weight: bold;
      user-select: none;
    }

    .terminal-input-text {
      flex: 1;
      color: #e6edf3;
      outline: none;
      caret-color: #58a6ff;
      border: none;
      background: transparent;
    }

    .terminal-input-text.placeholder {
      color: var(--text-dim);
    }

    .terminal-status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
      border-left: 1px solid var(--border);
      padding-left: 12px;
      margin-left: 12px;
      user-select: none;
      flex-shrink: 0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.idle { background: #8b949e; }
    .status-dot.active { background: #3fb950; animation: blink 1.5s infinite; }
    .status-dot.busy { background: #d29922; animation: blink 1.2s infinite; }
    .status-dot.error { background: #f85149; }

    @keyframes blink {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* Explanation Sidebar styling */
    .sidebar-desc {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      height: 520px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .sidebar-desc h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #ffffff;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .desc-section {
      margin-bottom: 16px;
    }

    .desc-section h3 {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-hover);
      margin-bottom: 6px;
    }

    .desc-section p, .desc-section li {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .desc-section ul {
      margin-left: 16px;
    }

    .state-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      margin-top: 8px;
    }

    .state-table th, .state-table td {
      border: 1px solid var(--border);
      padding: 6px;
      text-align: left;
    }

    .state-table th {
      background: var(--bg-card);
      color: var(--text);
    }

    /* Interactive /model selector simulated layout */
    .simulated-selector {
      margin-top: 8px;
      border: 1px dashed var(--border);
      padding: 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.02);
    }

    .selector-item {
      padding: 4px 6px;
      cursor: pointer;
      border-radius: 3px;
    }
    .selector-item:hover {
      background: var(--bg-hover);
    }
    .selector-item.selected {
      background: var(--accent);
      color: #ffffff;
    }
  </style>
</head>
<body>

    <h1>ypic CLI 终端交互原型 <span class="tag">UI 设计稿 (v2)</span></h1>
    <p>
      此原型模拟 <code>ypic</code> CLI 终端在不同运行状态下的布局与交互方案。
      本方案重点解决：1) 提示不足以引起用户对 Web 配套的注意；2) 输入框容易在终端翻滚中丢失；3) 模型/思考深度无切换入口；4) 普通输入无响应没有可见状态与心跳检测。
    </p>
    
    <div class="scenario-tabs">
      <button class="tab-btn active" onclick="switchState('startup')">1. 启动欢迎状态 (Startup)</button>
      <button class="tab-btn" onclick="switchState('idle')">2. 空闲输入状态 (Idle)</button>
      <button class="tab-btn" onclick="switchState('running')">3. 运行/流式状态 (Running/Streaming)</button>
      <button class="tab-btn" onclick="switchState('model')">4. /model 模型切换 (Model Select)</button>
      <button class="tab-btn" onclick="switchState('error')">5. 诊断/错误状态 (Error State)</button>
      <button class="tab-btn" onclick="switchState('fallback')">6. 非 TTY 降级 (Plain Fallback)</button>
    </div>
  </header>

  <main>
    <!-- Simulated Terminal -->
    <div class="terminal-container">
      <div class="terminal-header">

        <div class="terminal-title" id="terminal-title">ypic - /Volumes/01/ExternalStorage/.../pi-agnet-web</div>
        <div class="terminal-size">80x24</div>
      </div>
      
      <div class="terminal-body" id="terminal-body">
        <!-- Rendered dynamically by javascript -->
      </div>

      <!-- Bottom Interactive Input Area -->
      <div class="terminal-input-bar" id="terminal-input-bar">
        <div class="terminal-divider-line"></div>
        <div class="terminal-input-row">
          <div class="terminal-prompt-prefix" id="input-prompt-prefix">&gt;</div>
          <div class="terminal-input-text" id="input-display">Message...</div>
          <div class="terminal-status-badge" id="status-badge">
            <span class="status-dot idle" id="status-dot"></span>
            <span id="status-model-text">openai-codex/gpt-5.5 · high</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Details Sidebar -->
    <div class="sidebar-desc" id="sidebar-desc">
      <!-- Loaded dynamically -->
    </div>
  </main>

    <li><strong>模型配置缺失/AK缺失</strong>：直接给出警告，并提示运行 <code>/config</code> 直达 Web UI 配置面板。</li>
    <li><strong>运行中网络中断/SSE异常</strong>：状态灯变为红色，并在终端输出重连 Attempt 计数。</li>
  </ul>
</div>
        `
      },
      fallback: {
        title: "Plain Logs - ypic fallback mode",
        html: `

<h2>非 TTY 降级 (Plain Fallback)</h2>
<div class="desc-section">
  <h3>无害的日志输出</h3>
  <p>在 CI 环境、管道重定向 (pipe) 或 <code>YPIC_PLAIN=1</code>、不支持 ANSI 颜色转义的终端中，CLI 必须平滑降级：</p>

    function switchState(stateKey) {
      // Update tabs
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      // Find the tab that matches the onclick
      const activeBtn = Array.from(document.querySelectorAll('.tab-btn')).find(btn => {
        return btn.getAttribute('onclick').includes(stateKey);
      });
      if (activeBtn) activeBtn.classList.add('active');

      const state = states[stateKey];
      
      // Update terminal title
      document.getElementById('terminal-title').innerText = state.title;

      // Update terminal body
      document.getElementById('terminal-body').innerHTML = state.html;

      // Update input row
      const inputEl = document.getElementById('input-display');
      inputEl.innerText = state.input;
      if (state.inputIsPlaceholder) {
        inputEl.classList.add('placeholder');
      } else {
        inputEl.classList.remove('placeholder');
      }

      // Update status dot & text
      const dotEl = document.getElementById('status-dot');
      dotEl.className = 'status-dot ' + state.statusDot;
      document.getElementById('status-model-text').innerText = state.statusText;

      // Show/Hide input bar layout for fallback (which doesn't use the fixed bottom)
      const inputBar = document.getElementById('terminal-input-bar');
      const prefixEl = document.getElementById('input-prompt-prefix');
      
      if (stateKey === 'fallback') {
        inputBar.style.background = '#0d1117';
        prefixEl.style.opacity = '0.3';
        document.getElementById('status-badge').style.opacity = '0.3';
      } else {
        inputBar.style.background = '#010409';
        prefixEl.style.opacity = '1';
        document.getElementById('status-badge').style.opacity = '1';
      }

      // Update sidebar explanation
      document.getElementById('sidebar-desc').innerHTML = state.desc;

      // Auto scroll terminal to bottom
      const bodyEl = document.getElementById('terminal-body');
      bodyEl.scrollTop = bodyEl.scrollHeight;
    }

    // Initialize with startup state
    switchState('startup');
  </script>
